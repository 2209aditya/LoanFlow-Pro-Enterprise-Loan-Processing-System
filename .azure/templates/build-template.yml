parameters:
  serviceName: ''
  dockerfilePath: ''
  imageRepository: ''

stages:
- stage: Build
  jobs:
  - job: Build_Image
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build & Push Image
      inputs:
        command: buildAndPush
        repository: ${{ parameters.imageRepository }}
        dockerfile: ${{ parameters.dockerfilePath }}
        containerRegistry: 'ACR-Service-Connection'
        tags: |
          $(Build.BuildId)